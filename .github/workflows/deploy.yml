name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Run tests
        run: mvn test -Dmaven.repo.local=$HOME/.m2/repository

  build:
    name: Build JAR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          cache: maven

      - name: Build fat JAR
        run: mvn clean package -DskipTests -Dmaven.repo.local=$HOME/.m2/repository

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: mail-engine-jar
          path: backend/target/mail-engine-backend-*.jar
          retention-days: 1
          if-no-files-found: error

  deploy-aws:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: mail-engine-jar
          path: dist

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$EC2_SSH_KEY" > /tmp/deploy_key.pem
          chmod 400 /tmp/deploy_key.pem

          SSH="ssh -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no ec2-user@$EC2_HOST"
          JAR=$(find dist -name "mail-engine-backend-*.jar" ! -name "*.original" | head -1)

          $SSH "sudo chown ec2-user:ec2-user /opt/mail-engine/app.jar 2>/dev/null || true"
          scp -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no \
            "$JAR" "ec2-user@$EC2_HOST:/opt/mail-engine/app.jar"
          $SSH "sudo chown mailengine:mailengine /opt/mail-engine/app.jar && sudo systemctl restart mail-engine"

          sleep 8
          $SSH "sudo systemctl is-active mail-engine"

          rm -f /tmp/deploy_key.pem

  deploy-oci:
    name: Deploy to OCI
    runs-on: ubuntu-latest
    needs: build
    # Only runs when OCI_HOST secret is configured — set it once instance is live
    if: >
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.OCI_DEPLOY_ENABLED == 'true'

    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: mail-engine-jar
          path: dist

      - name: Deploy to OCI instance
        env:
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
        run: |
          echo "$OCI_SSH_KEY" > /tmp/oci_key.pem
          chmod 400 /tmp/oci_key.pem

          SSH="ssh -i /tmp/oci_key.pem -o StrictHostKeyChecking=no opc@$OCI_HOST"
          JAR=$(find dist -name "mail-engine-backend-*.jar" ! -name "*.original" | head -1)

          scp -i /tmp/oci_key.pem -o StrictHostKeyChecking=no \
            "$JAR" "opc@$OCI_HOST:/opt/mail-engine/app.jar"
          $SSH "sudo systemctl restart mail-engine"

          sleep 8
          $SSH "sudo systemctl is-active mail-engine"

          rm -f /tmp/oci_key.pem
