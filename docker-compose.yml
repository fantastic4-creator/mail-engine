services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mailengine
      POSTGRES_USER: mailengine
      POSTGRES_PASSWORD: mailengine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailengine"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 5000

volumes:
  postgres_data:
