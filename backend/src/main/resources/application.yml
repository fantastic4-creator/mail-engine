spring:
  application:
    name: mail-engine-backend
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mailengine}
    username: ${SPRING_DATASOURCE_USERNAME:mailengine}
    password: ${SPRING_DATASOURCE_PASSWORD:mailengine}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true

mail-engine:
  runtime:
    delivery-mode: ${MAIL_ENGINE_DELIVERY_MODE:local-outbox}
    storage-mode: ${MAIL_ENGINE_STORAGE_MODE:in-memory}
    smtp-relay-mode: ${MAIL_ENGINE_SMTP_RELAY_MODE:disabled}
    smtp-host: ${MAIL_ENGINE_SMTP_HOST:localhost}
    smtp-port: ${MAIL_ENGINE_SMTP_PORT:1025}
    smtp-username: ${MAIL_ENGINE_SMTP_USERNAME:}
    smtp-password: ${MAIL_ENGINE_SMTP_PASSWORD:}
    smtp-starttls-enabled: ${MAIL_ENGINE_SMTP_STARTTLS_ENABLED:false}
    smtp-auth-enabled: ${MAIL_ENGINE_SMTP_AUTH_ENABLED:false}
    from-local-part: ${MAIL_ENGINE_FROM_LOCAL_PART:no-reply}
    dkim-selector: ${MAIL_ENGINE_DKIM_SELECTOR:me1}
    spf-record-value: ${MAIL_ENGINE_SPF_RECORD_VALUE:v=spf1 mx ~all}
    dmarc-policy: ${MAIL_ENGINE_DMARC_POLICY:none}
    app-base-url: ${MAIL_ENGINE_APP_BASE_URL:http://localhost:8080}
    unsubscribe-hmac-secret: ${MAIL_ENGINE_UNSUBSCRIBE_HMAC_SECRET:change-me-in-production}
    send-loop-poll-ms: ${MAIL_ENGINE_SEND_LOOP_POLL_MS:5000}
    retry-max-attempts: ${MAIL_ENGINE_RETRY_MAX_ATTEMPTS:5}
    retry-backoff-seconds: ${MAIL_ENGINE_RETRY_BACKOFF_SECONDS:300}
    max-sends-per-hour: ${MAIL_ENGINE_MAX_SENDS_PER_HOUR:0}

management:
  endpoints:
    web:
      exposure:
        include: health,info

server:
  port: 8080
